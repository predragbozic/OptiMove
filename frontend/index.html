<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OptiMove</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">OM</div>
          <p class="brand-name">OptiMove</p>
          <button class="rail-toggle" id="railToggle" type="button" aria-expanded="false" aria-label="Expand navigation">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </div>

        <div class="sidebar-section sidebar-primary">
          <button class="brand-title rail-button" id="athletesToggle" type="button" aria-expanded="false">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 19v-1.5a3.5 3.5 0 0 0-3.5-3.5h-5A3.5 3.5 0 0 0 4 17.5V19"></path>
              <circle cx="10" cy="7" r="3"></circle>
              <path d="M20 19v-1.2a3 3 0 0 0-2.2-2.9"></path>
              <path d="M17 4.3a3 3 0 0 1 0 5.4"></path>
            </svg>
            <span>Athletes</span>
          </button>
          <button class="sidebar-nav-button rail-button" id="calendarToggle" type="button">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="16" height="15" rx="2"></rect>
              <path d="M8 3v4"></path>
              <path d="M16 3v4"></path>
              <path d="M4 10h16"></path>
              <path d="M8 14h.01"></path>
              <path d="M12 14h.01"></path>
              <path d="M16 14h.01"></path>
            </svg>
            <span>Calendar</span>
          </button>
        </div>

        <label class="search-field">
          <span>Athlete search</span>
          <input id="athleteSearch" type="search" placeholder="Name or ID">
        </label>

        <div class="athlete-list" id="athleteList"></div>

        <div class="sidebar-section">
          <button class="sidebar-nav-button rail-button" data-library-tab="builder" type="button">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 4h14v16H5z"></path>
              <path d="M8 8h8"></path>
              <path d="M8 12h5"></path>
              <path d="M15 15l3 3"></path>
              <path d="M18 15l-3 3"></path>
            </svg>
            <span>Builder</span>
          </button>
          <button class="sidebar-nav-button rail-button" data-library-tab="templates">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="2"></rect>
              <path d="M8 8h8"></path>
              <path d="M8 12h8"></path>
              <path d="M8 16h5"></path>
            </svg>
            <span>Templates</span>
          </button>
          <button class="sidebar-nav-button rail-button" data-library-tab="exercises">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 7h12"></path>
              <path d="M6 17h12"></path>
              <path d="M8 7v10"></path>
              <path d="M16 7v10"></path>
              <path d="M4 9v6"></path>
              <path d="M20 9v6"></path>
            </svg>
            <span>Exercises</span>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="contextLabel">Coach dashboard</p>
            <h2 id="screenTitle">Athletes and specific programs</h2>
          </div>
          <div class="topbar-actions">
            <span class="user-role" id="userRole" hidden></span>
            <button class="plain-button sign-out-button" id="signOutButton" type="button" hidden>Sign out</button>
            <div class="status-pill" id="apiStatus">Connecting</div>
          </div>
        </header>

        <section class="toolbar" id="viewToolbar"></section>
        <section class="content" id="content"></section>
      </main>
    </div>

    <div class="media-modal" id="mediaModal" hidden>
      <div class="media-backdrop" data-action="close-media"></div>
      <div class="media-dialog" role="dialog" aria-modal="true" aria-label="Exercise media">
        <div class="media-header">
          <h3 id="mediaTitle">Exercise media</h3>
          <button class="plain-button" data-action="close-media">Close</button>
        </div>
        <div class="media-body" id="mediaBody"></div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
