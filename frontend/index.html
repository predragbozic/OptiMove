<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OptiMove</title>
    <link rel="stylesheet" href="./styles.css?v=20260722-2">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <button class="brand-mark" type="button" data-action="home" aria-label="Home"><img class="brand-mark-icon" src="./brand-logo.png" alt="OptiMove"></button>
          <p class="brand-name">OptiMove</p>
          <button class="rail-toggle" id="railToggle" type="button" aria-expanded="false" aria-label="Expand navigation">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 18l6-6-6-6"></path>
            </svg>
          </button>
        </div>

        <div class="sidebar-section sidebar-primary">
          <button class="brand-title rail-button" id="athletesToggle" type="button" aria-expanded="false" title="Athletes">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 19v-1.5a3.5 3.5 0 0 0-3.5-3.5h-5A3.5 3.5 0 0 0 4 17.5V19"></path>
              <circle cx="10" cy="7" r="3"></circle>
              <path d="M20 19v-1.2a3 3 0 0 0-2.2-2.9"></path>
              <path d="M17 4.3a3 3 0 0 1 0 5.4"></path>
            </svg>
            <span>Athletes</span>
          </button>
          <button class="sidebar-nav-button rail-button" id="calendarToggle" type="button" title="Calendar">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="16" height="15" rx="2"></rect>
              <path d="M8 3v4"></path>
              <path d="M16 3v4"></path>
              <path d="M4 10h16"></path>
              <path d="M8 14h.01"></path>
              <path d="M12 14h.01"></path>
              <path d="M16 14h.01"></path>
              <path d="M8 17h.01"></path>
              <path d="M12 17h.01"></path>
              <path d="M16 17h.01"></path>
            </svg>
            <span>Calendar</span>
          </button>
        </div>

        <label class="search-field">
          <span>Athlete search</span>
          <input id="athleteSearch" type="search" placeholder="Name or ID">
        </label>

        <div class="athlete-list" id="athleteList"></div>

        <div class="sidebar-section">
          <button class="sidebar-nav-button rail-button" data-library-tab="coaches" title="Coaches">
            <svg class="rail-icon" viewBox="0 0 300 349" aria-hidden="true">
              <path d="M43 165 C37 123 40 83 59 54 C78 26 108 14 149 14 C190 14 222 27 241 56 C259 84 262 124 256 166" stroke-width="22"></path>
              <path d="M48 145 C79 130 108 117 142 114 C180 111 211 123 252 142" stroke-width="22"></path>
              <path d="M42 164 C48 181 59 193 76 193 C99 193 117 167 146 163 C174 160 195 184 219 184 C237 184 248 177 257 162" stroke-width="22"></path>
              <path d="M43 175 C25 169 17 178 20 198 C23 218 36 232 54 231 C61 230 66 227 70 223" stroke-width="22"></path>
              <path d="M257 175 C275 169 283 178 280 198 C277 218 264 232 246 231 C239 230 234 227 230 223" stroke-width="22"></path>
              <path d="M58 215 C65 255 84 289 112 312 C127 324 139 330 150 330 C162 330 174 324 189 312 C217 289 235 255 242 215" stroke-width="22"></path>
            </svg>
            <span>Coaches</span>
          </button>
        </div>

        <div class="sidebar-section">
          <button class="sidebar-nav-button rail-button" data-library-tab="builder" type="button" title="Builder">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="5" width="7" height="4" rx="1"></rect>
              <rect x="13" y="5" width="7" height="4" rx="1"></rect>
              <rect x="7" y="11" width="7" height="4" rx="1"></rect>
              <rect x="16" y="11" width="4" height="4" rx="1"></rect>
              <rect x="4" y="17" width="7" height="4" rx="1"></rect>
              <rect x="13" y="17" width="7" height="4" rx="1"></rect>
            </svg>
            <span>Builder</span>
          </button>
          <div class="sidebar-submenu" data-sidebar-submenu="program-library">
            <button class="sidebar-nav-button rail-button" data-library-tab="templates" data-template-scope="my_programs" title="Program Library">
              <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.5 8.5l9.5-6 9.5 6"></path>
                <path d="M3.5 9h17"></path>
                <path d="M5.8 9.6v8.4"></path>
                <path d="M18.2 9.6v8.4"></path>
                <path d="M9 10c1.2-.7 2-.7 3 0 1-.7 1.8-.7 3 0v7.4c-1.2-.7-2-.7-3 0-1-.7-1.8-.7-3 0z"></path>
                <path d="M3 20h18"></path>
              </svg>
              <span>Program Library</span>
            </button>
            <div class="sidebar-subnav" aria-label="Program Library sections">
              <button class="sidebar-subnav-button" data-library-tab="templates" data-template-scope="my_programs" type="button">My Programs</button>
              <button class="sidebar-subnav-button" data-library-tab="templates" data-program-library-section="requests" type="button">Requests</button>
              <button class="sidebar-subnav-button" data-library-tab="templates" data-template-scope="optimove" type="button">OptiMove</button>
              <button class="sidebar-subnav-button" data-library-tab="templates" data-template-scope="marketplace" type="button">Marketplace</button>
            </div>
          </div>
          <button class="sidebar-nav-button rail-button" data-library-tab="exercises" title="Exercise Library">
            <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 7v10"></path>
              <path d="M18 7v10"></path>
              <path d="M3 9v6"></path>
              <path d="M21 9v6"></path>
              <path d="M6 12h12"></path>
            </svg>
            <span>Exercise Library</span>
          </button>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-submenu" data-sidebar-submenu="settings" hidden>
            <button class="sidebar-nav-button rail-button" data-library-tab="organization" data-organization-section="overview" title="Settings">
              <svg class="rail-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2a2 2 0 0 1-4 0V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 0 1 4.2 17l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.2a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 0 1 7.2 4.2l.1.1A1.7 1.7 0 0 0 9.2 4a1.7 1.7 0 0 0 1-1.6V2a2 2 0 0 1 4 0v.2a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 0 1 20 6.2l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1H21a2 2 0 0 1 0 4h-.2a1.7 1.7 0 0 0-1.4 1Z"></path>
              </svg>
              <span>Settings</span>
            </button>
            <div class="sidebar-subnav" aria-label="Settings sections">
              <button class="sidebar-subnav-button" data-library-tab="organization" data-organization-section="users" type="button">Users</button>
              <button class="sidebar-subnav-button" data-library-tab="organization" data-organization-section="clubs" type="button">Clubs</button>
              <button class="sidebar-subnav-button" data-library-tab="organization" data-organization-section="teams" type="button">Teams</button>
              <button class="sidebar-subnav-button" data-library-tab="organization" data-organization-section="athletes" type="button">Athletes</button>
            </div>
          </div>
        </div>
      </aside>

      <button class="mobile-nav-backdrop" id="mobileNavBackdrop" type="button" data-action="mobile-nav-close" aria-label="Close menu" tabindex="-1"></button>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="contextLabel">Coach dashboard</p>
            <h2 id="screenTitle">Athletes and specific programs</h2>
          </div>
          <div class="topbar-actions">
            <button class="plain-button mobile-nav-toggle" id="mobileNavToggle" data-action="mobile-nav-toggle" type="button" aria-expanded="false" aria-label="Open menu" title="Menu">
              <span class="topbar-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M4 7h16M4 12h16M4 17h16"></path>
                </svg>
              </span>
            </button>
            <span class="user-role" id="userRole" hidden></span>
            <div class="notification-menu">
              <button class="plain-button notification-toggle" id="notificationToggle" data-action="notifications-toggle" type="button" aria-label="Notifications" title="Notifications" hidden>
                <span class="topbar-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M18 9.5a6 6 0 0 0-12 0v3.8l-1.8 3.1a1 1 0 0 0 .9 1.5h13.8a1 1 0 0 0 .9-1.5L18 13.3V9.5Z"></path>
                    <path d="M9.4 20a2.8 2.8 0 0 0 5.2 0"></path>
                    <path d="M10 4.2a2.2 2.2 0 0 1 4 0"></path>
                  </svg>
                </span>
                <span class="topbar-action-label">Notifications</span>
                <span class="notification-count" data-notification-count hidden>0</span>
              </button>
              <div class="notification-panel" id="notificationPanel" hidden></div>
            </div>
            <div class="message-menu">
              <button class="plain-button message-toggle" id="messageToggle" data-action="messages-toggle" type="button" aria-label="Messages" title="Messages" hidden>
                <span class="topbar-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M7.2 6.2h8.6a4 4 0 0 1 4 4v2.2a4 4 0 0 1-4 4h-3.1l-4.3 3v-3H7.2a4 4 0 0 1-4-4v-2.2a4 4 0 0 1 4-4Z"></path>
                    <path d="M8.8 4.2h5.5a4 4 0 0 1 4 4"></path>
                  </svg>
                </span>
                <span class="topbar-action-label">Messages</span>
                <span class="notification-count" data-message-count hidden>0</span>
              </button>
              <div class="message-panel" id="messagePanel" hidden></div>
            </div>
            <button class="plain-button sign-out-button" id="signOutButton" type="button" aria-label="Sign out" title="Sign out" hidden>
              <span class="topbar-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M9.5 5H6.8A2.8 2.8 0 0 0 4 7.8v8.4A2.8 2.8 0 0 0 6.8 19h2.7"></path>
                  <path d="M13 8l4 4-4 4"></path>
                  <path d="M17 12H8"></path>
                </svg>
              </span>
              <span class="topbar-action-label">Sign out</span>
            </button>
            <div class="status-pill" id="apiStatus">Connecting</div>
          </div>
        </header>

        <section class="toolbar" id="viewToolbar"></section>
        <section class="content" id="content"></section>
      </main>
    </div>

    <div class="media-modal" id="mediaModal" hidden>
      <div class="media-backdrop" data-action="close-media"></div>
      <div class="media-dialog" role="dialog" aria-modal="true" aria-label="Exercise media">
        <div class="media-header">
          <h3 id="mediaTitle">Exercise media</h3>
          <button class="plain-button" data-action="close-media">Close</button>
        </div>
        <div class="media-body" id="mediaBody"></div>
      </div>
    </div>

    <script type="module" src="./app.js?v=20260722-2"></script>
  </body>
</html>
